<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Transaction Manager</h1>

        <h2>Add Transaction</h2>
        <form id="transactionForm">
            <select id="categorySelect" required>
                <option value="">Select Category</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
            <input type="number" id="amountInput" placeholder="Amount" required>
            <input type="text" id="descriptionInput" placeholder="Description" required>
            <button type="submit">Add</button>
        </form>

        <h2>Balance: <span id="balance">$0</span></h2>

        <h2>Transactions</h2>
        <table id="transactionsTable" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div id="detailsBox" class="hidden">
            <h3>Details</h3>
            <p>Date: <span id="detailDate"></span></p>
            <p>Category: <span id="detailCategory"></span></p>
            <p>Amount: <span id="detailAmount"></span></p>
            <p>Description: <span id="detailDescription"></span></p>
            <button id="closeBtn">Close</button>
        </div>
    </div>

    <script type="module" src="src/index.js"></script>
</body>
</html>
